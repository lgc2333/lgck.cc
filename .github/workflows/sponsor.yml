name: Auto Update Sponsor List

permissions: write-all

on:
  push:
    paths:
      - site/sponsorkit.config.js
      - site/public/sponsors/direct-raw.json
      - .github/workflows/sponsor.yml
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sponsor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: true
      - uses: pnpm/action-setup@v6
        with:
          version: latest
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Run Job
        run: |-
          commit_title="chore(sponsor-ci): update sponsor SVGs"
          pnpm i
          cd site
          export SPONSORKIT_AFDIAN_TOKEN=${{ secrets.SPONSORKIT_AFDIAN_TOKEN }}
          export SPONSORKIT_AFDIAN_USER_ID=${{ secrets.SPONSORKIT_AFDIAN_USER_ID }}
          pnpm sponsor
          if [[ -n "$(git status -s)" ]]; then
            git add .
            git config user.name github-actions[bot]
            git config user.email github-actions[bot]@users.noreply.github.com
            if [[ "$(git log -1 --pretty=%s)" == "$commit_title" ]]; then
              git commit --amend --no-edit
              git push --force-with-lease
            else
              git commit -m "$commit_title"
              git push
            fi
          else
            echo "No changes detected."
          fi
