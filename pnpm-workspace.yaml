catalogMode: prefer
cleanupUnusedCatalogs: true

packages:
  - addons/*
  - legacy
  - site
  - demo
  - theme

allowBuilds:
  '@parcel/watcher': true
  cn-font-split: true
  core-js: false
  esbuild: true
  koffi: true
  protobufjs: true
  sharp: false
  vue-demi: false
  workerd: true

minimumReleaseAgeExclude:
  - '@unocss/config@66.7.4'
  - '@unocss/core@66.7.4'
  - '@unocss/eslint-plugin@66.7.4'
  - '@unocss/rule-utils@66.7.4'
  - prettier@3.9.4 || 3.9.6
  - '@cloudflare/workerd-darwin-64@1.20260721.1'
  - '@cloudflare/workerd-darwin-arm64@1.20260721.1'
  - '@cloudflare/workerd-linux-64@1.20260721.1'
  - '@cloudflare/workerd-linux-arm64@1.20260721.1'
  - '@cloudflare/workerd-windows-64@1.20260721.1'
  - miniflare@4.20260721.0
  - workerd@1.20260721.1
  - wrangler@4.113.0

catalog:
  '@antfu/eslint-config': ^9.1.0
  '@giscus/vue': ^3.1.1
  '@iconify-json/ic': ^1.2.4
