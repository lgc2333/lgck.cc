catalogMode: prefer
cleanupUnusedCatalogs: true
packages:
  - blog
  - demo
  - theme
  - third-party/*
allowBuilds:
  '@parcel/watcher': true
  core-js: set this to true or false
  esbuild: true
  sharp: set this to true or false
  vue-demi: set this to true or false
minimumReleaseAgeExclude:
  - '@unocss/config@66.7.4'
  - '@unocss/core@66.7.4'
  - '@unocss/eslint-plugin@66.7.4'
  - '@unocss/rule-utils@66.7.4'
  - prettier@3.9.4
catalog:
  '@antfu/eslint-config': ^9.1.0
  '@giscus/vue': ^3.1.1
  '@unocss/eslint-plugin': ^66.7.4
  eslint: ^10.6.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-format: ^2.0.1
  prettier: ^3.9.4
  semaphore-promise: ^1.4.4
  sponsorkit: ^17.1.1
  typescript: ^6.0.3
  valaxy: ^0.28.11
  valaxy-addon-components: ^0.1.0
  valaxy-theme-yun: ^0.28.11
  vue-gtag-next: ^1.14.0
  '@iconify-json/ant-design': ^1.2.7
  '@iconify-json/simple-icons': ^1.2.88
