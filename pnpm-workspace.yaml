  '@waline/client': 3.15.2
  artalk: ^2.9.1
  eslint: ^10.7.0
  eslint-config-prettier: ^10.1.8
  eslint-plugin-format: ^2.0.1
  medium-zoom: ^1.1.0
  prettier: ^3.9.6
